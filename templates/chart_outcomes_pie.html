<div>
    <canvas id="outcomes-pie-chart"></canvas>
</div>

<script>
(function() {
    var ctx = document.getElementById('outcomes-pie-chart');
    if (ctx && typeof Chart !== 'undefined') {
        var colors = [
            'rgba(99, 102, 241, 0.7)',
            'rgba(244, 114, 182, 0.7)',
            'rgba(251, 191, 36, 0.7)',
            'rgba(52, 211, 153, 0.7)',
            'rgba(147, 130, 233, 0.7)',
            'rgba(251, 146, 60, 0.7)',
            'rgba(148, 163, 184, 0.7)',
            'rgba(56, 189, 248, 0.7)',
            'rgba(232, 121, 249, 0.7)',
            'rgba(74, 222, 128, 0.7)'
        ];

        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: {{ labels_json|safe }},
                datasets: [{
                    data: [{% for outcome in outcomes %}{{ outcome.percentage }}{% if !loop.last %}, {% endif %}{% endfor %}],
                    backgroundColor: colors.slice(0, {{ outcomes.len() }}),
                    borderWidth: 2,
                    borderColor: 'rgba(255,255,255,0.8)'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                cutout: '55%',
                plugins: {
                    legend: {
                        display: false
                    },
                    title: {
                        display: true,
                        text: 'Outcomes Distribution',
                        font: { size: 13, weight: '600' },
                        padding: { bottom: 10 }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.label + ': ' + context.parsed + '%';
                            }
                        }
                    }
                }
            }
        });
    }
})();
</script>
