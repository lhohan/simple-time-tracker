{% if projects.len() > 0 %}
<h2>Time by Project</h2>
<table>
    <thead>
        <tr>
            <th>Project</th>
            <th>Duration</th>
            <th>Percentage</th>
        </tr>
    </thead>
    <tbody>
        {% for project in projects %}
        <tr>
            <td>
                <a href="#" hx-get="/api/tag/{{ project.description }}" hx-target="#detail">
                    {{ project.description }}
                </a>
            </td>
            <td>{{ project.minutes|format_duration }}</td>
            <td>
                <div class="pct-cell">
                    <span class="pct-value">{{ project.percentage }}%</span>
                    <div class="pct-bar"><div class="pct-bar-fill" style="width:{{ project.percentage }}%"></div></div>
                </div>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p>No data for this period.</p>
{% endif %}

<div id="detail"></div>
