<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Tracker Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --card-bg: #fff;
            --card-border: #e5e7eb;
            --radius: 0.75rem;
            --radius-sm: 0.5rem;
            --stat-bg: #f8fafc;
            --hover-row: #f9fafb;
            --pct-bar-bg: #e5e7eb;
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --card-bg: #1e1e2e;
                --card-border: #313244;
                --stat-bg: #181825;
                --hover-row: #25253a;
                --pct-bar-bg: #45475a;
            }
        }

        body {
            padding-top: 1rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.25rem;
        }

        .stat-card {
            background: var(--stat-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 1.5rem 2rem;
            margin-bottom: 1.25rem;
            text-align: center;
        }

        .stat-card .stat-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.7;
            margin-bottom: 0.25rem;
        }

        .stat-card .stat-value {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0;
            color: var(--accent);
        }

        .top-nav {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .top-nav a {
            display: inline-block;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            transition: background 0.15s, border-color 0.15s;
        }

        .top-nav a:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .top-nav a.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .btn-group {
            display: inline-flex;
            border-radius: 2rem;
            overflow: hidden;
            border: 1px solid var(--card-border);
            margin-bottom: 0.75rem;
        }

        .btn-group button {
            border: none;
            border-radius: 0;
            margin: 0;
            padding: 0.45rem 1rem;
            font-size: 0.85rem;
            background: var(--card-bg);
            color: var(--accent);
            cursor: pointer;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
        }

        .btn-group button:not(:last-child) {
            border-right: 1px solid var(--card-border);
        }

        .btn-group button:hover {
            background: var(--accent);
            color: #fff;
        }

        .btn-group button.active {
            background: var(--accent);
            color: #fff;
        }

        .date-range-row {
            display: flex;
            gap: 1rem;
            align-items: end;
            margin-top: 0.75rem;
        }

        .date-range-row label {
            flex: 1;
            margin-bottom: 0;
        }

        .date-range-row input[type="date"] {
            margin-bottom: 0;
        }

        table {
            border-collapse: separate;
            border-spacing: 0;
            border: 1px solid var(--card-border);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        table thead th {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            opacity: 0.7;
            padding: 0.65rem 1rem;
        }

        table tbody td {
            padding: 0.6rem 1rem;
        }

        table tbody tr:hover {
            background: var(--hover-row);
        }

        .pct-cell {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .pct-bar {
            flex: 1;
            height: 6px;
            background: var(--pct-bar-bg);
            border-radius: 3px;
            overflow: hidden;
            max-width: 80px;
        }

        .pct-bar-fill {
            height: 100%;
            border-radius: 3px;
            background: var(--accent);
        }

        .pct-value {
            min-width: 3ch;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .grid-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .grid-stats .stat-card {
            margin-bottom: 0;
        }

        .page-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .chart-sidebar canvas {
            max-width: 100%;
            max-height: 300px;
        }

        @media (max-width: 768px) {
            .date-range-row {
                flex-direction: column;
                gap: 0.5rem;
            }

            .btn-group {
                flex-wrap: wrap;
                border-radius: var(--radius-sm);
            }
        }
    </style>
</head>
<body>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
