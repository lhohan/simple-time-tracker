{% if projects.len() > 0 %}
<h2>Time by Project</h2>
<table>
    <thead>
        <tr>
            <th>Project</th>
            <th>Duration</th>
            <th>Percentage</th>
        </tr>
    </thead>
    <tbody>
        {% for project in projects %}
        <tr>
            <td>
                <a href="#" hx-get="/api/tag/{{ project.description }}" hx-target="#detail" hx-include="#filter-form">
                    {{ project.description }}
                </a>
            </td>
            <td>{{ project.minutes|format_duration }}</td>
            <td>
                <div class="pct-cell">
                    <span class="pct-value">{{ project.percentage }}%</span>
                    <div class="pct-bar"><div class="pct-bar-fill" style="width:{{ project.percentage }}%"></div></div>
                </div>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p>No data for this period.</p>
{% endif %}

<div id="detail"></div>

<div id="summary" hx-swap-oob="true">
    <div class="stat-card">
        <div class="stat-label">Total Time Tracked</div>
        <div class="stat-value">{{ total_time }}</div>
    </div>
</div>

<div id="chart-pie" hx-swap-oob="true">
    <canvas id="projects-pie-chart"></canvas>
</div>

<script>
(function() {
    var ctx = document.getElementById('projects-pie-chart');
    if (ctx && typeof Chart !== 'undefined') {
        if (window.projectsChart) {
            window.projectsChart.destroy();
        }

        var colors = [
            'rgba(99, 102, 241, 0.7)',
            'rgba(244, 114, 182, 0.7)',
            'rgba(251, 191, 36, 0.7)',
            'rgba(52, 211, 153, 0.7)',
            'rgba(147, 130, 233, 0.7)',
            'rgba(251, 146, 60, 0.7)',
            'rgba(148, 163, 184, 0.7)',
            'rgba(56, 189, 248, 0.7)',
            'rgba(232, 121, 249, 0.7)',
            'rgba(74, 222, 128, 0.7)'
        ];

        window.projectsChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: {{ labels_json|safe }},
                datasets: [{
                    data: [{% for project in projects %}{{ project.percentage }}{% if !loop.last %}, {% endif %}{% endfor %}],
                    backgroundColor: colors.slice(0, {{ projects.len() }}),
                    borderWidth: 2,
                    borderColor: 'rgba(255,255,255,0.8)'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                cutout: '55%',
                plugins: {
                    legend: {
                        display: false
                    },
                    title: {
                        display: true,
                        text: 'Project Distribution',
                        font: { size: 13, weight: '600' },
                        padding: { bottom: 10 }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.label + ': ' + context.parsed + '%';
                            }
                        }
                    }
                }
            }
        });
    }
})();
</script>
